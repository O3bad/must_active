name: muster_sport
description: MUSTER Sport — University Sports Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2
  fl_chart: ^1.2.0
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  uuid: ^4.4.2
  google_fonts: ^8.0.2
  # BLoC
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  equatable: ^2.0.5
  # HTTP
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0
  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_messaging: ^16.1.3
  firebase_storage: ^13.2.0
  flutter_local_notifications: ^21.0.0
  google_sign_in: ^6.2.1
  # Media
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  # Permissions
  permission_handler: ^11.3.1
  # Utilities
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/users_cache.json
